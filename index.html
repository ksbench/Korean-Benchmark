<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ko-Speech-Eval Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <p class="sidebar-kicker">KoALa-bench</p>
          <h1>Leaderboard</h1>
        </div>
        <nav id="taskMenu" class="task-menu"></nav>
      </aside>

      <main class="content">
        <header class="hero">
          <div class="hero-topline">
            <div>
              <p class="kicker">Korean Audio Language benchmark</p>
              <h2>Leaderboard for KoALa</h2>
              <a href="https://github.com/ksbench/Korean-Benchmark" target="_blank">
                <img
                  src="https://img.shields.io/badge/github-KoALa-lightgray"
                  alt="github KoALa"
                  style="margin-top: 8px;"
                />
              </a>
            </div>
          </div>
        </header>

        <section id="homeView" class="view"></section>
        <section id="taskView" class="view hidden"></section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
