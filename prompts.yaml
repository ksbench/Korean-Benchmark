# --- K-disentQA (Knowledge Disentanglement QA) ---
# prompt_text_only: 텍스트만 모드 (무음 오디오 + 질문/선택지)
# prompt_speech: 음성+텍스트 모드 (context 음성 + 질문/선택지)
# answer_suffix: 선택지 뒤에 붙는 답 유도 구절
kdisentqa:
  - name: v1
    prompt_text_only: "다음 질문에 답변하세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    prompt_speech: "음성에서 들려준 내용만을 근거로 다음 질문에 답변하세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    answer_suffix: "\n답: "
  - name: v2
    prompt_text_only: "질문에 맞는 답을 고르세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    prompt_speech: "음성에서 제공된 정보에만 기반하여 질문에 맞는 답을 고르세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    answer_suffix: "\n답: "
  - name: v3
    prompt_text_only: "아래 질문에 가장 적절한 답을 선택하세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    prompt_speech: "반드시 음성에서 들은 내용을 바탕으로 아래 질문에 가장 적절한 답을 선택하세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    answer_suffix: "\n답: "
  - name: v4
    prompt_text_only: "주어진 선택지 중 올바른 답을 고르세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    prompt_speech: "음성의 내용만을 참고하여 주어진 선택지 중 올바른 답을 고르세요.\n\n예시:\n질문: 철수는 어디에서 친구를 만났나요?\n(A) 학교 (B) 공원 (C) 도서관 (D) 카페\n답: (B)\n\n"
    answer_suffix: "\n답: "
